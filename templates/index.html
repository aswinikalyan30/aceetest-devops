<!DOCTYPE html>
<html>

<head>
<title>ACEest Gym Dashboard</title>
</head>

<body>

<h1>ACEest Client Management</h1>

<h2>Add Client</h2>

<form action="/add_client" method="post">

Name:
<input name="name">

Age:
<input name="age">

Height:
<input name="height">

Weight:
<input name="weight">

Program:
<input name="program">

<button type="submit">Add</button>

</form>

<hr>

<h2>Client List</h2>

<ul>

{% for client in clients %}

<li>
{{client[1]}} | Weight: {{client[4]}} | Program: {{client[5]}}
</li>

{% endfor %}

</ul>

</body>
</html>
